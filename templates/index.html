<!DOCTYPE html>
<html>
<head>
    <title>CSV Analytics Dashboard</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            margin-bottom: 20px;
        }
        h1 {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">📊 CSV Analytics Dashboard</h1>

    <!-- Upload Card -->
    <div class="card shadow">
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <input class="form-control" type="file" name="file" required>
                </div>
                <button class="btn btn-primary">Upload & Analyze</button>
            </form>
        </div>
    </div>

    {% if columns %}
    <!-- Column Selector -->
    <div class="card shadow">
        <div class="card-body">
            <h5>Select Columns for Visualization</h5>
            <form method="POST">
                <select class="form-select" name="x_col">
                    {% for col in columns %}
                        <option value="{{ col }}">{{ col }}</option>
                    {% endfor %}
                </select>
                <br>
                <select class="form-select" name="y_col">
                    {% for col in columns %}
                        <option value="{{ col }}">{{ col }}</option>
                    {% endfor %}
                </select>
                <br>
                <button class="btn btn-success">Generate Chart</button>
            </form>
        </div>
    </div>
    {% endif %}

    {% if summary %}
    <!-- Summary Card -->
    <div class="card shadow">
        <div class="card-body">
            <h5>Summary Statistics</h5>
            {{ summary|safe }}
        </div>
    </div>
    {% endif %}

    {% if chart %}
    <!-- Chart Card -->
    <div class="card shadow">
        <div class="card-body">
            <h5>Visualization</h5>
            <img src="{{ chart }}" class="img-fluid">
        </div>
    </div>
    {% endif %}

    {% if heatmap %}
    <!-- Heatmap -->
    <div class="card shadow">
        <div class="card-body">
            <h5>Correlation Heatmap</h5>
            <img src="{{ heatmap }}" class="img-fluid">
        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
