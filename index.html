<!DOCTYPE html>
<html>
<head>
    <title>CSV Dashboard</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        input, button {
            padding: 10px;
            margin-top: 10px;
        }
        img {
            margin-top: 20px;
            max-width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 CSV Data Dashboard</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br>
        <button type="submit">Upload & Analyze</button>
    </form>

    {% if columns %}
        <h3>Columns:</h3>
        <p>{{ columns }}</p>
    {% endif %}

    {% if summary %}
        <h3>Summary Statistics</h3>
        {{ summary|safe }}
    {% endif %}

    {% if chart %}
        <h3>Distribution Charts</h3>
        <img src="{{ chart }}">
    {% endif %}
</div>

</body>
</html>
